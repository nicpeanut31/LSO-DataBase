<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><style>body{padding:24px;background:#f4f8f6}.preview{max-width:1450px;margin:auto}.duty-roster-person{margin:0}.panel{padding:24px}</style></head><body><div class="preview"><div class="panel"><div class="duty-roster-grid">
<article class="duty-roster-card trainee-roster-card">
<header class="duty-roster-card-header"><div class="duty-roster-identity"><span class="roster-orbit blue-orbit">01</span><div class="duty-roster-title-copy"><p class="eyebrow">Training Stage</p><h4>Trainee Period</h4><small>Current trainee duty-hour records</small></div></div><strong class="duty-roster-count">1</strong></header>
<div class="duty-roster-report-actions"><button class="button button-secondary duty-period-print"><span>Print Current</span><strong>Trainees</strong></button><button class="button button-secondary duty-period-print duty-monthly-print"><span>Print Monthly</span><strong>Trainee Report</strong></button></div>
<div class="duty-roster-list"><button class="duty-roster-person active"><span class="member-avatar">2</span><span class="duty-roster-person-copy"><strong>2dsv</strong><small>LSO-2026-0031</small><span class="badge badge-green">ACTIVE</span></span><span class="duty-roster-balance">Not set</span></button></div></article>
<article class="duty-roster-card probationary-roster-card">
<header class="duty-roster-card-header"><div class="duty-roster-identity"><span class="roster-orbit gold-orbit">02</span><div class="duty-roster-title-copy"><p class="eyebrow">Evaluation Stage</p><h4>Probationary Period</h4><small>Current probationary duty-hour records</small></div></div><strong class="duty-roster-count">0</strong></header>
<div class="duty-roster-report-actions"><button class="button button-secondary duty-period-print" disabled><span>Print Current</span><strong>Probationary</strong></button><button class="button button-secondary duty-period-print duty-monthly-print" disabled><span>Print Monthly</span><strong>Probationary Report</strong></button></div>
<div class="duty-roster-list"><div class="roster-empty"><strong>No active Probationary records</strong><small>Current Probationary members will appear here.</small></div></div></article>
</div></div></div></body></html>
